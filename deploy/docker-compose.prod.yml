version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: blogapp-postgres-prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-blogapp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-blogdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blogapp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-blogapp_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blogapp-redis-prod
    volumes:
      - redis_data:/data
    networks:
      - blogapp-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    image: mrbeko/blog-app:api-latest # Tek Private Repo + Tag stratejisi
    container_name: blogapp-api-prod
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-blogdb};Username=${POSTGRES_USER:-blogapp_user};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=${JWT_SECRET}
      - JwtSettings__Issuer=${JWT_ISSUER:-BlogApp}
      - JwtSettings__Audience=${JWT_AUDIENCE:-BlogApp}
      - JwtSettings__ExpirationMinutes=${JWT_EXPIRATION_MINUTES:-60}
      - CorsOrigins__0=https://mrbekox.dev # ALB üzerinden HTTPS geldiği için
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blogapp-network
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads

  frontend:
    image: mrbeko/blog-app:web-latest # Tek Private Repo + Tag stratejisi
    container_name: blogapp-frontend-prod
    environment:
      - NEXT_PUBLIC_API_URL=https://mrbekox.dev/api # Client-side istekler HTTPS olmalı
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - blogapp-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: blogapp-nginx-prod
    ports:
      - "80:80" # ALB trafiği buraya iletir
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api
    networks:
      - blogapp-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  blogapp-network:
    driver: bridge