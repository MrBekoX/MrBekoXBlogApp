services:
  postgres:
    image: postgres:16-alpine
    container_name: blogapp-postgres-prod
    env_file:
      - .env
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - blogapp-network
    restart: unless-stopped
    # Memory limits for low-RAM server
    mem_limit: 128m
    mem_reservation: 64m
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blogapp-redis-prod
    env_file:
      - .env
    # Added maxmemory policy for LRU eviction
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}", "--maxmemory", "32mb", "--maxmemory-policy", "allkeys-lru" ]
    volumes:
      - redis_data:/data
    networks:
      - blogapp-network
    restart: unless-stopped
    # Memory limits for low-RAM server
    mem_limit: 64m
    mem_reservation: 32m
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "no-auth-warning", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: blogapp-rabbitmq-prod
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - blogapp-network
    restart: unless-stopped
    mem_limit: 128m
    mem_reservation: 64m
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    image: mrbeko/blog-app:api-latest
    container_name: blogapp-api-prod
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DOTNET_SYSTEM_GLOBALIZATION_INVARIANT: "1"
      # PostgreSQL - .env'den doğrudan alınan değerler
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      # Redis - şifre .env'den REDIS_PASSWORD olarak geliyor
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD},abortConnect=false,connectTimeout=10000,syncTimeout=5000"
      # RabbitMQ Configuration
      RabbitMq__Enabled: "true"
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: "5672"
      RabbitMq__Username: "${RABBITMQ_USER}"
      RabbitMq__Password: "${RABBITMQ_PASS}"
      RabbitMq__VirtualHost: /
      RabbitMq__ExchangeName: blog.events
      # JWT
      JwtSettings__Secret: "${JWT_SECRET}"
      JwtSettings__Issuer: BlogApp
      JwtSettings__Audience: BlogApp
      JwtSettings__ExpirationMinutes: "60"
      # Admin kullanıcı
      AdminUser__Email: "${ADMIN_EMAIL}"
      AdminUser__UserName: "${ADMIN_USERNAME}"
      AdminUser__Password: "${ADMIN_PASSWORD}"
      AdminUser__FirstName: Admin
      # CORS
      CorsOrigins__0: https://mrbekox.dev
      CorsOrigins__1: https://www.mrbekox.dev
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - blogapp-network
    restart: unless-stopped
    # Memory limits for low-RAM server
    mem_limit: 300m
    mem_reservation: 150m
    volumes:
      - ./uploads:/app/uploads

  ai-agent:
    image: mrbeko/blog-app:ai-agent-latest
    container_name: blogapp-ai-agent-prod
    env_file:
      - .env
    environment:
      # AI Model Configuration (ZhipuAI)
      ZHIPUAI_API_KEY: "${ZHIPUAI_API_KEY}"
      LLM_MODEL: "${LLM_MODEL:-glm-4}"
      # Redis Configuration
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      # RabbitMQ Configuration
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: "${RABBITMQ_USER}"
      RABBITMQ_PASS: "${RABBITMQ_PASS}"
      RABBITMQ_VHOST: /
      # Backend API Configuration
      BACKEND_API_URL: "http://api:8080/api/v1"
      # Server Settings
      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "false"
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blogapp-network
    restart: unless-stopped
    mem_limit: 256m
    mem_reservation: 128m
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    image: mrbeko/blog-app:web-latest
    container_name: blogapp-frontend-prod
    # NEXT_PUBLIC_API_URL is baked at build time via Dockerfile ARG
    # To change it, rebuild with: docker build --build-arg NEXT_PUBLIC_API_URL=https://yoururl.com/api
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    # Memory limits for low-RAM server
    mem_limit: 64m
    mem_reservation: 32m
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: blogapp-nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - blogapp-network
    restart: unless-stopped
    # Memory limits for low-RAM server
    mem_limit: 32m
    mem_reservation: 16m

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:


networks:
  blogapp-network:
    driver: bridge
