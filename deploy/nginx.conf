events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    
    # Global default - 1MB for most endpoints
    client_max_body_size 1M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream frontend {
        server frontend:3000;
    }

    upstream api {
        server api:8080;
    }

    # www -> non-www redirect
    server {
        listen 80;
        server_name www.mrbekox.dev;
        return 301 https://mrbekox.dev$request_uri;
    }

    server {
        listen 80;
        server_name mrbekox.dev _;

        # Security Headers - Applied to all responses
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
        
        # HSTS - Only when HTTPS is confirmed via ALB
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        
        # Content Security Policy - Adjusted for Next.js
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://mrbekox.dev wss://mrbekox.dev; frame-ancestors 'none';" always;

        # Defense-in-depth: HTTPS enforcement via X-Forwarded-Proto
        # ALB already redirects, but this adds extra protection
        set $redirect_to_https 0;
        if ($http_x_forwarded_proto != 'https') {
            set $redirect_to_https 1;
        }
        # Exception for health checks (ALB sends HTTP health checks)
        if ($request_uri = /health) {
            set $redirect_to_https 0;
        }
        if ($redirect_to_https = 1) {
            return 301 https://$host$request_uri;
        }

        # ALB Health Check - No redirect, no body size limit
        location /health {
            proxy_pass http://api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            access_log off;
        }

        # Media Upload Endpoints - 20MB limit
        location ~ ^/api/v[0-9]+/media/upload {
            client_max_body_size 20M;
            
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API Requests - 1MB limit (global default)
        location /api {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme; 
        }

        # SignalR Hubs - WebSocket support, 1MB limit
        location /hubs/ {
            proxy_pass http://api;
            
            # WebSocket headers
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeout settings
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 75s;
            
            # Disable caching
            proxy_cache_bypass $http_upgrade;
        }

        # Frontend (Next.js) - 1MB limit
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}