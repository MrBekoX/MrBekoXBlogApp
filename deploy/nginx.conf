events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    upstream frontend {
        server frontend:3000;
    }

    upstream api {
        server api:8080;
    }

    # www -> non-www redirect
    server {
        listen 80;
        server_name www.mrbekox.dev;
        return 301 https://mrbekox.dev$request_uri;
    }

    server {
        listen 80;
        server_name mrbekox.dev _;

        # ALB Sağlık Kontrolü
        location /health {
            proxy_pass http://api/health;
            access_log off;
        }

        # 1. API İstekleri (v1 prefix'i backend'de tanımlı olduğu için)
        location /api {
            proxy_pass http://api; # Backend'e iletir
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme; 
        }

        # 2. SignalR Hubs (Backend'de app.MapHub<CacheInvalidationHub>("/hubs/cache") olduğu için)
        # NOT: proxy_pass'ta URI belirtilmemeli, aksi halde /negotiate gibi sub-path'ler kayboluyor
        # SignalR Hubs - WebSocket Ayarları
        location /hubs/ {
            # 'api' yerine docker-compose'daki backend servis adınızı yazın (örn: http://api:8080 veya http://backend)
            proxy_pass http://api; 
            # WebSocket için kritik başlıklar
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        
            # Standart Proxy Başlıkları
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Önbellekleme devre dışı bırakılmalı
            proxy_cache_bypass $http_upgrade;
        }

        # 3. Frontend (Next.js)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}