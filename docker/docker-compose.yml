# IMPORTANT: Copy .env.example to .env and set your passwords before running!
# Never commit .env file to git.
# Usage: cd docker && docker-compose up -d

name: MrBekoXBlogApp

services:
  postgres:
    image: postgres:18-alpine
    container_name: blogapp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-blogdb_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-blogdb_dev}" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  redis:
    image: redis:8-alpine
    container_name: blogapp-redis
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: blogapp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:?RABBITMQ_USER is required}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:?RABBITMQ_PASS is required}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    image: blogapp-backend:latest
    pull_policy: never
    container_name: blogapp-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-blogdb_dev};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=${RABBITMQ_USER:?RABBITMQ_USER is required}
      - RabbitMQ__Password=${RABBITMQ_PASS:?RABBITMQ_PASS is required}
      - RabbitMQ__Enabled=true
      - InternalServiceAuth__ServiceKey=${INTERNAL_SERVICE_AUTH_KEY:?INTERNAL_SERVICE_AUTH_KEY is required}
      - JwtSettings__Secret=${JwtSettings__Secret:?JwtSettings__Secret is required}
      - JwtSettings__Issuer=BlogApp
      - JwtSettings__Audience=BlogApp
      - CorsOrigins__0=http://localhost:3000
      - CorsOrigins__1=http://localhost:8080
      - CorsOrigins__2=http://localhost:5173
      - CorsOrigins__3=http://127.0.0.1:3000
      - CorsOrigins__4=http://127.0.0.1:8080
      - Turnstile__SiteKey=${TURNSTILE_SITE_KEY:-}
      - Turnstile__SecretKey=${TURNSTILE_SECRET_KEY:-}

    ports:
      - "8080:8080"
    volumes:
      - ../src/BlogApp.Server/BlogApp.Server.Api/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../src/blogapp-web
      dockerfile: ../../docker/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_SIGNALR_URL: http://localhost:8080
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
        API_URL: http://backend:8080/api/v1
        REWRITE_URL: http://backend:8080
    image: blogapp-frontend:latest
    pull_policy: never
    container_name: blogapp-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_SIGNALR_URL=http://localhost:8080
      - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${TURNSTILE_SITE_KEY:-}
      - API_URL=http://backend:8080/api/v1
      - REWRITE_URL=http://backend:8080
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ai-agent-service:
    build:
      context: ../src/services/ai-agent-service
      dockerfile: ../../../docker/ai-agent-service/Dockerfile
    image: blogapp-ai-agent:latest
    pull_policy: never
    container_name: blogapp-ai-agent
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-phi4-mini}
      - OLLAMA_EMBEDDING_MODEL=${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-120}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-4096}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.7}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:?RABBITMQ_USER is required}
      - RABBITMQ_PASS=${RABBITMQ_PASS:?RABBITMQ_PASS is required}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BACKEND_API_URL=http://backend:8080/api/v1
      - DEBUG=false
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - INTERNAL_SERVICE_AUTH_HEADER_NAME=X-Service-Key
      - INTERNAL_SERVICE_AUTH_KEY=${INTERNAL_SERVICE_AUTH_KEY:?INTERNAL_SERVICE_AUTH_KEY is required}
      # Idle shutdown configuration (cost optimization)
      - IDLE_SHUTDOWN_ENABLED=${IDLE_SHUTDOWN_ENABLED:-true}
      - IDLE_TIMEOUT_SECONDS=${IDLE_TIMEOUT_SECONDS:-1800}  # 30 minutes
    volumes:
      - chroma_data:/app/chroma_data:rw
      - ./logs:/app/logs:rw
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s


volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  chroma_data:




