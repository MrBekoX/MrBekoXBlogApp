# IMPORTANT: Copy .env.example to .env and set your passwords before running!
# Never commit .env file to git.
# Usage: cd docker && docker-compose up -d

name: MrBekoXBlogApp

services:
  postgres:
    image: postgres:16-alpine
    container_name: blogapp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-blogdb_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-blogdb_dev}" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: blogapp-redis
    command: redis-server ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: blogapp-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    image: blogapp-backend:latest
    pull_policy: never
    container_name: blogapp-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=${POSTGRES_DB:-blogdb_dev};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - ConnectionStrings__Redis=redis:6379
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=${RABBITMQ_USER:-guest}
      - RabbitMQ__Password=${RABBITMQ_PASS:-guest}
      - RabbitMQ__Enabled=true
      - JwtSettings__Secret=${JwtSettings__Secret:?JwtSettings__Secret is required}
      - JwtSettings__Issuer=BlogApp
      - JwtSettings__Audience=BlogApp
      - CorsOrigins=http://localhost:3000,http://localhost:8080,http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - ../src/BlogApp.Server/BlogApp.Server.Api/uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ../src/blogapp-web
      dockerfile: ../../docker/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
        API_URL: http://backend:8080/api/v1
    image: blogapp-frontend:latest
    pull_policy: never
    container_name: blogapp-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
      - API_URL=http://backend:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ai-agent-service:
    build:
      context: ../src/services/ai-agent-service
      dockerfile: ../../../docker/ai-agent-service/Dockerfile.hardened
    image: blogapp-ai-agent:hardened
    pull_policy: never
    container_name: blogapp-ai-agent

    # Security Hardening
    security_opt:
      - no-new-privileges:true
      - seccomp:seccomp-profile.json

    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/run:noexec,nosuid,size=50m

    user: "1000:1000"

    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:4b}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-120}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-4096}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.7}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - BACKEND_API_URL=http://backend:8080/api/v1
      - DEBUG=false
      - CHROMA_PERSIST_DIR=/app/chroma_data
    volumes:
      - chroma_data:/app/chroma_data:rw
      - ./logs:/app/logs:rw
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  chroma_data:
