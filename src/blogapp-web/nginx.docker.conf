server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Static assets - long cache (Next.js hashed filenames)
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Public assets
    location /images/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Favicon and static files
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Custom 404 error page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Block old admin URL - serve custom 404 page
    location = /admin {
        return 404;
    }
    location ^~ /admin/ {
        return 404;
    }

    # Static routes - serve .html files for existing routes, 404 for non-existent
    # Next.js static export creates .html files for each route
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
